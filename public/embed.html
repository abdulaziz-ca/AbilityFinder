<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <!-- SCOPE: update when BC launches (see BC_ENABLED in app.js) -->
  <title>Find disability benefits in Alberta — AbilityFinder</title>
  <style>
    :root { color-scheme: light; --ink:#211d19; --paper:#fbf4e8; --muted:#6b6259; --line:#d9c9b5; --accent:#a7462d; --accent-dark:#7d2f1f; }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-width: 0; background: transparent; }
    body { padding: 8px; color: var(--ink); font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .card { width: 100%; max-width: 680px; min-height: 404px; margin: 0 auto; padding: clamp(20px, 5vw, 30px); border: 1px solid var(--line); border-radius: 18px; background: var(--paper); box-shadow: 0 10px 28px rgba(47, 35, 23, .09); }
    .wordmark { display: inline-flex; align-items: center; gap: 9px; color: var(--ink); font-size: .86rem; font-weight: 750; letter-spacing: .02em; text-decoration: none; }
    .mark { width: 19px; height: 19px; border: 5px solid var(--accent); border-radius: 50%; }
    h1 { max-width: 580px; margin: 18px 0 12px; font-family: Georgia, "Times New Roman", serif; font-size: clamp(1.55rem, 6vw, 2.1rem); line-height: 1.06; letter-spacing: -.025em; }
    .values { display: flex; flex-wrap: wrap; gap: 4px 9px; margin: 0 0 22px; padding: 0; color: var(--muted); font-size: .8rem; list-style: none; }
    .values li:not(:last-child)::after { margin-left: 9px; content: "·"; }
    fieldset { min-width: 0; margin: 0; padding: 0; border: 0; }
    legend { margin-bottom: 9px; font-weight: 750; }
    .choices { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .choice { min-height: 44px; padding: 8px 6px; border: 1px solid var(--line); border-radius: 10px; background: rgba(255,255,255,.48); color: var(--ink); font: inherit; font-size: .85rem; font-weight: 650; cursor: pointer; }
    .choice:hover, .choice:focus-visible { border-color: var(--accent); outline: 2px solid transparent; }
    .choice[aria-pressed="true"] { border-color: var(--accent); background: var(--accent); color: #fff; }
    .cta { display: block; width: 100%; margin-top: 14px; padding: 12px 18px; border-radius: 10px; background: var(--accent); color: #fff; font-weight: 750; text-align: center; text-decoration: none; }
    .cta:hover, .cta:focus-visible { background: var(--accent-dark); outline: 3px solid rgba(167,70,45,.24); outline-offset: 2px; }
    .cta[hidden] { display: none; }
    @media (max-width: 390px) { .choices { grid-template-columns: 1fr; } .card { min-height: 0; } }
  </style>
</head>
<body>
  <main class="card">
    <a class="wordmark" href="https://abilityfinder.ca/" target="_top" rel="noopener"><span class="mark" aria-hidden="true"></span>AbilityFinder</a>
    <!-- SCOPE: update when BC launches (see BC_ENABLED in app.js) -->
    <h1>Find every disability benefit you may qualify for in Alberta</h1>
    <ul class="values" aria-label="Why use AbilityFinder">
      <li>Free</li><li>Private, answers stay on the device</li><li>Every fact linked to official sources</li>
    </ul>
    <fieldset>
      <legend>Who needs support?</legend>
      <div class="choices">
        <button class="choice" type="button" aria-pressed="false">Myself</button>
        <button class="choice" type="button" aria-pressed="false">My child</button>
        <button class="choice" type="button" aria-pressed="false">Someone I help</button>
      </div>
    </fieldset>
    <a class="cta" href="https://abilityfinder.ca/" target="_top" rel="noopener" hidden>See your benefits (1 minute)</a>
  </main>
  <script src="/embed.js"></script>
</body>
</html>
